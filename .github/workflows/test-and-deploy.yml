name: Test and Deploy
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run automatically at 8AM PST Monday-Friday
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TF_INPUT: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -timeout=120s

  # Validates the distribution path that this fork actually relies on:
  # `make install` into the local filesystem mirror, resolved by Terraform via
  # source address registry.terraform.io/layerx/twilio. Needs no Twilio secrets,
  # so it runs on every trigger (including PRs) and guards the mirror layout,
  # binary name, and source address against regressions.
  install-verify:
    name: Install (filesystem mirror) Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install provider into local filesystem mirror
        run: make install

      - name: Verify Terraform resolves the provider from the mirror
        run: |
          set -euo pipefail
          cat > "$HOME/.terraformrc" <<EOF
          provider_installation {
            filesystem_mirror {
              path    = "$HOME/.terraform.d/plugins"
              include = ["registry.terraform.io/layerx/*"]
            }
            direct {
              exclude = ["registry.terraform.io/layerx/*"]
            }
          }
          EOF
          workdir="$(mktemp -d)"
          cat > "$workdir/main.tf" <<'EOF'
          terraform {
            required_providers {
              twilio = {
                source  = "registry.terraform.io/layerx/twilio"
                version = "0.18.46"
              }
            }
          }
          EOF
          terraform -chdir="$workdir" init

  # NOTE: Acceptance tests (make testacc / TF_ACC) hit the real Twilio API and
  # require credentials this fork does not provision, so they are intentionally
  # NOT run in CI (they would always fail). The `make testacc` target remains for
  # local runs. The proper path to secret-free CI coverage is mock-based tests
  # (see issue/follow-up); add a CI job once that exists.

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [ test, install-verify ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
